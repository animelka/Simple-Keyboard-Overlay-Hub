<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'unsafe-inline' https://mfkqhqypwlobydddkjjx.supabase.co https://cdn.jsdelivr.net; connect-src 'self' https://mfkqhqypwlobydddkjjx.supabase.co;">
    <title>OV Hub | Secure</title>
    <style>
        :root { --green: #3ecf8e; --bg: #050505; --card: rgba(22, 22, 22, 0.8); --text: #f0f0f0; --border: rgba(255, 255, 255, 0.1); }
        body { font-family: 'Inter', sans-serif; background: radial-gradient(circle at top, #1a1a1a 0%, #050505 100%); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { max-width: 900px; width: 100%; }
        h1 { font-size: 2.5em; text-align: center; margin-bottom: 30px; letter-spacing: 2px; }
        .upload-section { background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 40px; backdrop-filter: blur(10px); }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; }
        .btn-send { width: 100%; background: var(--green); color: black; font-weight: 800; border: none; padding: 16px; border-radius: 10px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-send:disabled { background: #222; color: #555; cursor: not-allowed; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .card { background: var(--card); border-radius: 18px; padding: 20px; border: 1px solid var(--border); transition: 0.3s; }
        .card h3 { margin: 0 0 8px 0; color: var(--green); }
        .status { font-size: 0.9em; margin-bottom: 15px; padding: 12px; border-radius: 8px; display: none; text-align: center; background: rgba(255,255,255,0.05); }
        .download-btn { width: 100%; padding: 10px; background: transparent; border: 1.5px solid var(--green); color: var(--green); cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>OV HUB <span style="color:var(--green)">.</span></h1>
    <div class="upload-section">
        <h2>Опубликовать скин</h2>
        <div id="status-msg" class="status"></div>
        <input type="text" id="username" placeholder="Твой никнейм" maxlength="25">
        <input type="text" id="skin-name" placeholder="Название скина" maxlength="35">
        <div style="border: 2px dashed var(--border); padding: 20px; text-align: center; border-radius: 10px; cursor: pointer; margin: 10px 0;" onclick="document.getElementById('file-field').click()">
            Выбрать .ov файл
            <input type="file" id="file-field" accept=".ov" style="display:none">
        </div>
        <p id="file-name-display" style="text-align:center; color:var(--green); font-size:0.8em;"></p>
        <button id="upload-btn" class="btn-send">Загрузить</button>
    </div>
    <div class="grid" id="skins-grid"></div>
</div>

<script type="module">
    import fpjs from 'https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@3/+esm';

    const SB_URL = 'https://mfkqhqypwlobydddkjjx.supabase.co'; 
    const SB_KEY = 'sb_publishable_DsOLEjTMa8LN7vOO8dMy-Q_vMm1biTD';
    const COOLDOWN_MS = 30 * 60 * 1000;

    let selectedFileData = null;
    let visitorId = null;

    // Получаем ID железа
    async function getDeviceId() {
        const fp = await fpjs.load();
        const result = await fp.get();
        visitorId = result.visitorId;
    }
    getDeviceId();

    const showStatus = (text, color) => {
        const el = document.getElementById('status-msg');
        el.style.display = "block"; el.style.color = color; el.innerText = text;
    };

    document.getElementById('file-field').onchange = (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = (ev) => {
            selectedFileData = ev.target.result;
            document.getElementById('file-name-display').innerText = "✓ " + file.name;
        };
        reader.readAsText(file);
    };

    async function uploadSkin() {
        const user = document.getElementById('username').value.trim();
        const sName = document.getElementById('skin-name').value.trim();
        const btn = document.getElementById('upload-btn');

        if (!visitorId) { showStatus("Инициализация защиты... подожди 1 сек", "orange"); return; }
        if (!user || !sName || !selectedFileData) { showStatus("Заполни все поля!", "orange"); return; }

        btn.disabled = true;
        showStatus("Проверка устройства...", "white");

        try {
            // ПРОВЕРКА ПО DEVICE ID В БАЗЕ
            const resCheck = await fetch(`${SB_URL}/rest/v1/overlays?device_id=eq.${visitorId}&order=created_at.desc&limit=1`, {
                headers: { 'apikey': SB_KEY }
            });
            const lastPost = await resCheck.json();

            if (lastPost && lastPost.length > 0) {
                const diff = Date.now() - new Date(lastPost[0].created_at).getTime();
                if (diff < COOLDOWN_MS) {
                    const left = Math.ceil((COOLDOWN_MS - diff) / 60000);
                    showStatus(`Это устройство заблокировано на ${left} мин.`, "orange");
                    btn.disabled = false; return;
                }
            }

            // ЗАГРУЗКА С DEVICE_ID
            const response = await fetch(`${SB_URL}/rest/v1/overlays`, {
                method: 'POST',
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: sName, author: user, config: selectedFileData, device_id: visitorId })
            });

            if (response.ok) {
                showStatus("Готово!", "var(--green)");
                setTimeout(() => location.reload(), 1500);
            } else {
                showStatus("Ошибка БД (проверь колонку device_id)", "red");
                btn.disabled = false;
            }
        } catch (e) { showStatus("Ошибка сети", "red"); btn.disabled = false; }
    }

    // Загрузка карточек (без изменений)
    async function loadSkins() {
        const res = await fetch(`${SB_URL}/rest/v1/overlays?select=*&order=created_at.desc`, { headers: { 'apikey': SB_KEY } });
        const skins = await res.json();
        document.getElementById('skins-grid').innerHTML = skins.map(s => `
            <div class="card">
                <h3>${s.name}</h3>
                <div style="color:#888; font-size:0.8em; margin-bottom:15px;">От: ${s.author}</div>
                <button class="download-btn" onclick="alert('Скачивание...')">СКАЧАТЬ</button>
            </div>
        `).join('');
    }

    document.getElementById('upload-btn').onclick = uploadSkin;
    loadSkins();
</script>
</body>
</html>
