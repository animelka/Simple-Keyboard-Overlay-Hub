<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OV Hub | Premium Overlays</title>
    <style>
        :root { --green: #3ecf8e; --bg: #0a0a0a; --card: #161616; --text: #ededed; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 900px; width: 100%; }
        
        /* Форма загрузки */
        .upload-section { background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 40px; }
        h2 { color: var(--green); margin-top: 0; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        input:focus { border-color: var(--green); outline: none; }
        .file-input { border: 1px dashed var(--green); cursor: pointer; text-align: center; padding: 20px; transition: 0.3s; }
        .file-input:hover { background: #1a1a1a; }
        
        /* Кнопка */
        .btn-send { background: var(--green); color: black; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        .btn-send:hover { background: #34b27b; transform: scale(1.02); }
        .btn-send:disabled { background: #222; color: #555; cursor: not-allowed; transform: none; }

        /* Сетка файлов */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #222; position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--green); }
        .card h3 { margin: 0 0 10px 0; font-size: 1.1em; color: var(--green); }
        .card .author { color: #888; font-size: 0.85em; margin-bottom: 15px; }
        .card .preview { height: 60px; background: #000; border-radius: 6px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.7em; color: #444; border: 1px solid #333; letter-spacing: 2px; }
        
        .status { font-size: 0.9em; margin-bottom: 15px; padding: 10px; border-radius: 5px; display: none; background: rgba(255,255,255,0.05); }
        
        .copy-btn { background: transparent; border: 1px solid var(--green); color: var(--green); cursor: pointer; }
        .copy-btn:hover { background: var(--green); color: black; }
    </style>
</head>
<body>

<div class="container">
    <h1>OV HUB <span style="color:var(--green)">.</span></h1>

    <div class="upload-section">
        <h2>Опубликовать скин</h2>
        <div id="status-msg" class="status"></div>
        
        <input type="text" id="username" placeholder="Твой никнейм" maxlength="25">
        <input type="text" id="skin-name" placeholder="Название скина (например: Neon Gold)" maxlength="35">
        
        <div class="file-input" onclick="document.getElementById('file-field').click()">
            Нажми, чтобы выбрать .ov файл
            <input type="file" id="file-field" accept=".ov" style="display:none">
        </div>
        
        <p id="file-name-display" style="font-size: 0.8em; color: var(--green); margin: 10px 0;"></p>
        <button id="upload-btn" class="btn-send">ЗАГРУЗИТЬ В ОБЛАКО</button>
    </div>

    <h2>Последние поступления</h2>
    <div class="grid" id="skins-grid">
        </div>
</div>

<script type="module">
    const SB_URL = 'https://mfkqhqypwlobydddkjjx.supabase.co'; 
    const SB_KEY = 'sb_publishable_DsOLEjTMa8LN7vOO8dMy-Q_vMm1biTD';

    let selectedFileData = null;

    // Безопасное отображение текста (защита от взлома)
    const escapeHTML = (str) => {
        const p = document.createElement('p');
        p.textContent = str;
        return p.innerHTML;
    };

    // Чтение файла
    document.getElementById('file-field').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const content = event.target.result;
            if (content.length < 5 || content.length > 60000) {
                showStatus("Ошибка: Файл слишком большой или поврежден!", "red");
                selectedFileData = null;
                return;
            }
            selectedFileData = content;
            document.getElementById('file-name-display').innerText = "✓ Файл выбран: " + file.name;
        };
        reader.readAsText(file);
    });

    // Функция загрузки
    async function uploadSkin() {
        const user = document.getElementById('username').value.trim();
        const sName = document.getElementById('skin-name').value.trim();
        const btn = document.getElementById('upload-btn');

        if (!user || !sName || !selectedFileData) {
            showStatus("Заполни все поля и выбери файл!", "orange");
            return;
        }

        btn.disabled = true;
        showStatus("Синхронизация с базой...", "white");

        try {
            // Проверка на дубликаты
            const check = await fetch(`${SB_URL}/rest/v1/overlays?config=eq.${encodeURIComponent(selectedFileData)}&select=id`, {
                headers: { 'apikey': SB_KEY }
            }).then(r => r.json());

            if (check && check.length > 0) {
                showStatus("Этот скин уже есть в хабе!", "orange");
                btn.disabled = false;
                return;
            }

            // Отправка данных
            const response = await fetch(`${SB_URL}/rest/v1/overlays`, {
                method: 'POST',
                headers: {
                    'apikey': SB_KEY,
                    'Authorization': `Bearer ${SB_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({
                    name: sName,
                    author: user,
                    config: selectedFileData
                })
            });

            if (response.ok) {
                showStatus("Успешно опубликовано!", "var(--green)");
                setTimeout(() => location.reload(), 1500);
            } else {
                const errJson = await response.json();
                showStatus("Ошибка БД: " + (errJson.message || "проверьте RLS"), "red");
                btn.disabled = false;
            }
        } catch (err) {
            showStatus("Ошибка сети: " + err.message, "red");
            btn.disabled = false;
        }
    }

    // Загрузка скинов
    async function loadSkins() {
        try {
            const res = await fetch(`${SB_URL}/rest/v1/overlays?select=*&order=created_at.desc`, {
                headers: { 'apikey': SB_KEY }
            });
            const skins = await res.json();
            
            const grid = document.getElementById('skins-grid');
            if (!skins || skins.length === 0) {
                grid.innerHTML = "<p>Пока ничего нет. Будь первым!</p>";
                return;
            }

            grid.innerHTML = skins.map(s => {
                // Кодируем конфиг в Base64 для безопасного хранения в атрибуте кнопки
                const safeData = btoa(unescape(encodeURIComponent(s.config)));
                return `
                <div class="card">
                    <div class="preview">.OV CONFIG</div>
                    <h3>${escapeHTML(s.name)}</h3>
                    <div class="author">Автор: ${escapeHTML(s.author)}</div>
                    <button class="copy-btn" data-payload="${safeData}">СКАЧАТЬ</button>
                </div>`;
            }).join('');

            // Логика кнопок копирования
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.onclick = () => {
                    const rawData = decodeURIComponent(escape(atob(btn.dataset.payload)));
                    navigator.clipboard.writeText(rawData);
                    
                    const oldText = btn.innerText;
                    btn.innerText = "СКОПИРОВАНО!";
                    btn.style.background = "var(--green)";
                    btn.style.color = "black";
                    
                    setTimeout(() => {
                        btn.innerText = oldText;
                        btn.style.background = "";
                        btn.style.color = "";
                    }, 1500);
                };
            });

        } catch (e) {
            console.error(e);
            showStatus("Не удалось загрузить ленту", "red");
        }
    }

    function showStatus(text, color) {
        const el = document.getElementById('status-msg');
        el.style.display = "block";
        el.style.color = color;
        el.innerText = text;
    }

    document.getElementById('upload-btn').onclick = uploadSkin;
    loadSkins();
</script>

</body>
</html>
